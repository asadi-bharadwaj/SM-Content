server.port=8086
# Eureka service id (uppercase matches gateway lb://CONTENT-SERVICE)
spring.application.name=CONTENT-SERVICE

# Eureka — register with local service registry (start SM-Service-registry first)
eureka.client.service-url.defaultZone=http://127.0.0.1:8761/eureka/
eureka.instance.prefer-ip-address=true

management.endpoints.web.exposure.include=health,info

# Optional: set MONGODB_URI in a local `.env` file (see `.env.example`) or in the OS environment.
spring.data.mongodb.uri=${MONGODB_URI:mongodb+srv://kanchuganesh789:Master%40123@nursery.7amnd.mongodb.net/ces_content?retryWrites=true&w=majority&appName=nursery}

profile.service.base-url=http://localhost:8082

# Media / S3 — credentials are NOT in this file. Set OS environment variables (or ~/.aws/credentials).
#
# Required for S3 uploads (when S3_BUCKET is set):
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
# Optional:
#   AWS_SESSION_TOKEN          (temporary / assumed-role creds)
#   AWS_PROFILE                (use a named profile from ~/.aws/credentials)
#   AWS_REGION                 (region for the SDK; also used below as default for bucket URL)
#
# App-specific:
#   S3_BUCKET                  bucket name; if empty, uploads use content.upload.directory + /media/**
#
aws.s3.bucket=${S3_BUCKET:}
aws.s3.region=${AWS_REGION:eu-north-1}

content.upload.directory=./data/uploads

spring.servlet.multipart.max-file-size=80MB
spring.servlet.multipart.max-request-size=85MB

# Tomcat access log (file under ./logs/ — use tail -f logs/access_log.*.log)
server.tomcat.accesslog.enabled=true
server.tomcat.accesslog.directory=logs
server.tomcat.accesslog.prefix=access_log
server.tomcat.accesslog.suffix=.log
server.tomcat.accesslog.pattern=%h %l %u %t "%r" %s %b %D ms
server.tomcat.accesslog.buffered=false
